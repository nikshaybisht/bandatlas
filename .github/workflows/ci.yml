name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Dataset + tests + production build
        env:
          # Local/CI default base is / ; Pages workflow sets /bandatlas/
          VITE_BASE: /
        run: npm run ci
