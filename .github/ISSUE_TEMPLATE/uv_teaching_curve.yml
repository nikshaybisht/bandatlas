name: UV teaching curve
description: Propose or contribute a multi-Gaussian UV–Vis teaching envelope (not experimental SI).
title: "[uv-seed] "
labels: ["enhancement", "good first issue"]
body:
  - type: markdown
    attributes:
      value: |
        **Teaching envelopes only.** Do not paste copyrighted instrument traces without rights.
        Guide: [docs/ADD_SPECTRUM.md](https://github.com/nikshaybisht/bandatlas/blob/main/docs/ADD_SPECTRUM.md)

        Prefer opening a PR with `data/uv-seeds/<id>.json`. This issue is for proposals and discussion.
  - type: input
    id: compound_id
    attributes:
      label: Proposed compound id (kebab-case)
      placeholder: nile-red
    validations:
      required: true
  - type: input
    id: display_name
    attributes:
      label: Display name
      placeholder: Nile Red
    validations:
      required: true
  - type: input
    id: formula
    attributes:
      label: Formula
      placeholder: C20H18N2O2
  - type: input
    id: cid
    attributes:
      label: PubChem CID (preferred for 3D)
  - type: input
    id: solvent
    attributes:
      label: Solvent / conditions note
      placeholder: methanol
    validations:
      required: true
  - type: textarea
    id: lambda_max
    attributes:
      label: Literature λ_max (nm)
      description: List peaks and a short source (table, DOI, handbook). Required for a good first issue seed.
      placeholder: |
        ~553 nm (MeOH) — replace with your citation
    validations:
      required: true
  - type: textarea
    id: peaks
    attributes:
      label: Suggested multi-Gaussian peaks (optional)
      description: "[{ lambda, height, sigma }, …] — leave blank if maintainers should sketch heights"
  - type: dropdown
    id: family
    attributes:
      label: Family
      options:
        - dyes
        - xanthenes
        - coumarins
        - aromatic-hydrocarbons
        - pahs
        - porphyrins
        - biomolecules
        - solvents
        - heterocycles
        - pharmaceuticals
        - food
        - quinones
    validations:
      required: true
  - type: checkboxes
    id: honesty
    attributes:
      label: Honesty checklist
      options:
        - label: I understand this will be labeled quality teaching, never experimental
          required: true
        - label: λ_max comes from a citeable source (or I will add one before PR merge)
          required: true
