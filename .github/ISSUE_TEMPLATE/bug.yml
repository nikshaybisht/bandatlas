name: Bug report
description: Something is broken in the UI, build, export, or offline path.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Include compound id and browser when possible.
        Live: https://nikshaybisht.github.io/bandatlas/
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search / filters
        - Spectrum plot
        - 3D structure
        - Export / lab note pack
        - Lab companion
        - Dataset build / CI
        - Pages deploy / routing
        - Other
    validations:
      required: true
  - type: input
    id: compound
    attributes:
      label: Compound id (if relevant)
      description: kebab-case id, e.g. benzene, rhodamine-b
      placeholder: benzene
  - type: dropdown
    id: technique
    attributes:
      label: Technique tab
      options:
        - UV–Vis
        - IR
        - Raman
        - N/A
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open /lab
        2. Search …
        3. Click Export …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: Chrome 131 / Windows 11
  - type: checkboxes
    id: offline
    attributes:
      label: Environment
      options:
        - label: Happens offline / with PubChem blocked
        - label: Happens on live Pages demo
        - label: Happens after `npm run ci` locally
